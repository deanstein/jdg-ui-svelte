<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		%sveltekit.head%
		<link rel="icon" href="https://res.cloudinary.com/jdg-main/image/upload/v1759708726/jdg-ui-svelte/jdg-logo-ui.png" />
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link 
			href="https://fonts.googleapis.com/css2?family=Anta&display=swap" 
			rel="stylesheet">
		<link
			href="https://fonts.googleapis.com/css2?family=REM&display=swap" 
			rel="stylesheet">
			<link
			href="https://fonts.googleapis.com/css2?family=Righteous&display=swap" 
			rel="stylesheet">
			<link href="https://fonts.googleapis.com/css2?family=Anta&family=Goldman:wght@400;700&display=swap" rel="stylesheet">
		<script src="https://kit.fontawesome.com/6cf50e6673.js" crossorigin="anonymous"></script>
		<script>
			(function() {
				var STORAGE_KEY = 'jdg-color-mode-preference';
				var saved = null;
				try { saved = localStorage.getItem(STORAGE_KEY); } catch(e) {}
				var prefersDark = saved === 'dark' ||
					(saved !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
				if (prefersDark) {
					document.documentElement.style.backgroundColor = 'rgb(30, 30, 30)';
					document.documentElement.style.colorScheme = 'dark';
				}
			})();
		</script>
	</head>
	<body data-sveltekit-preload-data="hover">
		<div>%sveltekit.body%</div>
	</body>
</html>
