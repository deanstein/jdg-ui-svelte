name: Sync npm publish to GitHub Release

# Runs when you publish to npm and then trigger this workflow with the new version.
# GitHub cannot see npmjs.com publishes, so run this manually after each npm publish.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version just published to npm (e.g. 2.0.0)'
        required: true
        type: string

jobs:
  create-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ github.event.inputs.version }}"
          git push origin "v${{ github.event.inputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: v${{ github.event.inputs.version }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}